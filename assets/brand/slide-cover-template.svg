<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Документы для бизнеса — V0.4 slide cover template</title>
  <desc id="desc">Титульный слайд 16:9 для внутренней презентации V0.4: dark business surface, route field and controlled lime signal.</desc>
  <metadata>status: V0.4 REVIEW / INTERNAL DRAFT; public use requires separate owner, design and rights review.</metadata>
  <defs>
