<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 1400" role="img" aria-labelledby="title desc">
  <title id="title">Документы для бизнеса — matrix specimen board V0.3</title>
  <desc id="desc">V0.4 internal specimen board: site hero, ads, story, banner, slide, local contact, palette budget, route logic and background families.</desc>
  <metadata>status: V0.4 REVIEW / INTERNAL DRAFT; public release remains HOLD.</metadata>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.58" stop-color="#111318"/>
      <stop offset="1" stop-color="#33215F"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.64" stop-color="#F2F2F2"/>
      <stop offset="1" stop-color="#DDE3EA"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#245DA7"/>
      <stop offset="0.72" stop-color="#2E7CF6"/>
      <stop offset="1" stop-color="#C6FF00"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#F2F2F2" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <pattern id="paperGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#162844" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .font { font-family: Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif; }
      .label { font-size: 18px; font-weight: 800; letter-spacing: 4px; }
      .title { font-size: 54px; font-weight: 820; }
      .h { font-size: 30px; font-weight: 790; }
      .b { font-size: 18px; font-weight: 500; }
      .s { font-size: 14px; font-weight: 650; }
    </style>
  </defs>
  <rect width="2200" height="1400" fill="url(#bg)"/>
  <rect width="2200" height="1400" fill="url(#grid)"/>
  <path d="M-120 1040C220 830 420 1110 710 894C986 688 1250 704 1550 822C1810 924 1980 760 2320 690" fill="none" stroke="#7B61FF" stroke-opacity="0.18" stroke-width="54" stroke-linecap="round"/>
  <path d="M-120 1062C226 852 422 1130 718 914C992 714 1254 724 1558 846C1814 948 1984 784 2320 712" fill="none" stroke="#C6FF00" stroke-opacity="0.70" stroke-width="10" stroke-linecap="round"/>
  <g class="font">
    <text x="72" y="94" class="label" fill="#C6FF00">V0.4 REVIEW / INTERNAL DRAFT · PUBLIC HOLD</text>
    <text x="72" y="164" class="title" fill="#F2F2F2">Balanced Expressive Business System</text>
    <text x="72" y="210" class="b" fill="#DDE3EA">Документы для бизнеса: деловая ясность, route-field, document geometry, controlled bright signal.</text>
  </g>
  <g class="font" transform="translate(72 280)">
    <rect width="570" height="330" rx="18" fill="url(#paper)"/>
    <rect width="570" height="330" rx="18" fill="url(#paperGrid)"/>
    <text x="34" y="52" class="s" fill="#245DA7">SITE HERO MINI-PREVIEW</text>
    <text x="34" y="124" class="h" fill="#111821">Разберём ситуацию</text>
    <text x="34" y="164" class="b" fill="#2A2D34">Маршрут через документы без каталога услуг.</text>
    <rect x="34" y="220" width="218" height="56" rx="10" fill="#245DA7"/>
    <text x="60" y="255" class="s" fill="#FFFFFF">Разобрать ситуацию</text>
    <path d="M310 238H514" stroke="url(#route)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="310" cy="238" r="16" fill="#FFFFFF" stroke="#245DA7" stroke-width="4"/>
    <circle cx="412" cy="238" r="16" fill="#FFFFFF" stroke="#245DA7" stroke-width="4"/>
    <circle cx="514" cy="238" r="17" fill="#C6FF00" stroke="#111318" stroke-width="4"/>
  </g>
