    <text x="34" y="58" class="s" fill="#C6FF00">SLIDE COVER</text>
    <text x="34" y="130" font-size="42" font-weight="820" fill="#F2F2F2">Система перед</text>
    <text x="34" y="180" font-size="42" font-weight="820" fill="#F2F2F2">материалом</text>
    <text x="34" y="234" class="b" fill="#DDE3EA">Слайд держит один вывод.</text>
  </g>
  <g class="font" transform="translate(684 700)">
