    <text x="32" y="58" class="s" fill="#245DA7">LOCAL CONTACT</text>
    <text x="32" y="118" class="h" fill="#111821">Симферополь</text>
    <text x="32" y="164" class="b" fill="#2A2D34">ул. Мате Залки, 1 · +7 (978) 998-72-22</text>
    <path d="M32 206H420" stroke="#C69A47" stroke-width="7" stroke-linecap="round"/>
    <circle cx="420" cy="206" r="16" fill="#C6FF00"/>
  </g>
  <g class="font" transform="translate(1250 640)">
    <text x="0" y="0" class="label" fill="#DDE3EA">PALETTE / ACCENT BUDGET</text>
    <rect y="40" width="126" height="76" rx="12" fill="#0B0F14" stroke="#3A3F48"/>
    <rect x="146" y="40" width="126" height="76" rx="12" fill="#111318"/>
    <rect x="292" y="40" width="126" height="76" rx="12" fill="#2A2D34"/>
    <rect x="438" y="40" width="126" height="76" rx="12" fill="#F2F2F2"/>
    <rect x="584" y="40" width="126" height="76" rx="12" fill="#C6FF00"/>
    <rect x="730" y="40" width="126" height="76" rx="12" fill="#7B61FF"/>
    <text x="584" y="150" class="s" fill="#C6FF00">lime max 6-8%</text>
    <text x="730" y="150" class="s" fill="#DDE3EA">violet depth</text>
    <text x="0" y="220" class="label" fill="#DDE3EA">BACKGROUND FAMILIES</text>
    <g class="s" fill="#DDE3EA">
      <text x="0" y="270">Matrix paper · Calm grid · Route ribbon</text>
      <text x="0" y="310">Document geometry · Gradient depth</text>
      <text x="0" y="350">Dark business surface · Local contact surface</text>
    </g>
  </g>
  <g class="font" transform="translate(72 1090)">
    <text x="0" y="0" class="label" fill="#C6FF00">ROUTE LOGIC</text>
    <path d="M0 76H890" stroke="url(#route)" stroke-width="10" stroke-linecap="round"/>
    <g fill="#F2F2F2" stroke="#245DA7" stroke-width="4">
      <circle cx="0" cy="76" r="22"/>
      <circle cx="296" cy="76" r="22"/>
      <circle cx="592" cy="76" r="22"/>
    </g>
    <circle cx="890" cy="76" r="24" fill="#C6FF00" stroke="#111318" stroke-width="5"/>
    <g class="b" fill="#F2F2F2">
      <text x="-10" y="140">ситуация</text>
      <text x="262" y="140">разбор</text>
      <text x="548" y="140">документы</text>
      <text x="830" y="140">следующий шаг</text>
    </g>
  </g>
