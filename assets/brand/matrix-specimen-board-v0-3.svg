    <text x="28" y="124" font-size="34" font-weight="800" fill="#111821">Разбор</text>
    <text x="28" y="164" font-size="34" font-weight="800" fill="#111821">ситуации</text>
    <rect x="28" y="214" width="160" height="48" rx="9" fill="#245DA7"/>
    <text x="47" y="245" class="s" fill="#FFFFFF">CTA</text>
    <circle cx="252" cy="220" r="16" fill="#C6FF00"/>
  </g>
  <g class="font" transform="translate(1024 250)">
    <rect width="220" height="390" rx="22" fill="#111318" stroke="#F2F2F2" stroke-opacity="0.16"/>
    <path d="M150 0H220V390H176C146 270 150 120 150 0Z" fill="#7B61FF" opacity="0.20"/>
    <text x="26" y="58" class="s" fill="#C6FF00">STORY</text>
    <text x="26" y="128" font-size="30" font-weight="800" fill="#F2F2F2">Сначала</text>
    <text x="26" y="166" font-size="30" font-weight="800" fill="#F2F2F2">разбор</text>
    <rect x="26" y="294" width="150" height="52" rx="10" fill="#C6FF00"/>
    <text x="48" y="327" class="s" fill="#111318">CTA</text>
  </g>
  <g class="font" transform="translate(1288 280)">
    <rect width="780" height="250" rx="18" fill="url(#paper)"/>
    <path d="M500 0H780V250H456C478 190 506 94 500 0Z" fill="#162844"/>
    <text x="34" y="58" class="s" fill="#245DA7">HORIZONTAL BANNER</text>
    <text x="34" y="130" font-size="42" font-weight="810" fill="#111821">Сначала разберём ситуацию</text>
    <text x="34" y="178" class="b" fill="#2A2D34">Один смысл, один CTA, один контур.</text>
    <path d="M548 138H716" stroke="url(#route)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="716" cy="138" r="17" fill="#C6FF00" stroke="#111318" stroke-width="4"/>
  </g>
  <g class="font" transform="translate(72 670)">
