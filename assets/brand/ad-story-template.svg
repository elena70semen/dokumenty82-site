<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Документы для бизнеса — story advertising pilot template</title>
  <desc id="desc">Вертикальный шаблон 1080x1920 для внутреннего рекламного пилота: верхняя бренд-зона, маршрут 01-04 и CTA выше нижней UI-зоны.</desc>
  <metadata>status: Stage 04 REVIEW / internal draft; public use requires owner, design and rights approval.</metadata>
  <defs>
    <linearGradient id="storyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.54" stop-color="#111318"/>
      <stop offset="1" stop-color="#33215F"/>
    </linearGradient>
    <linearGradient id="routeLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E7CF6"/>
      <stop offset="0.82" stop-color="#245DA7"/>
      <stop offset="1" stop-color="#C6FF00"/>
    </linearGradient>
    <pattern id="darkGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#F2F2F2" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1080" height="1920" fill="url(#storyBg)"/>
  <rect width="1080" height="1920" fill="url(#darkGrid)"/>
  <path d="M742 0H1080V1920H864C792 1488 790 1054 864 618C896 428 850 220 742 0Z" fill="#7B61FF" fill-opacity="0.16"/>
  <path d="M924 0V1920" stroke="#C6FF00" stroke-opacity="0.16" stroke-width="22"/>
  <path d="M748 1412C822 1338 904 1468 1002 1368" fill="none" stroke="#F2F2F2" stroke-opacity="0.16" stroke-width="7" stroke-linecap="round"/>

  <g font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
    <text x="72" y="202" font-size="28" font-weight="800" fill="#F2F2F2">Документы для бизнеса</text>
    <text x="72" y="246" font-size="22" font-weight="650" fill="#DDE3EA">Центр подготовки документов</text>

    <text x="72" y="456" font-size="84" font-weight="760" fill="#F2F2F2">Разберём</text>
    <text x="72" y="552" font-size="84" font-weight="760" fill="#F2F2F2">ситуацию</text>
    <text x="72" y="648" font-size="84" font-weight="760" fill="#F2F2F2">по документам</text>
    <text x="72" y="730" font-size="34" font-weight="500" fill="#DDE3EA">Сначала вводные, потом маршрут.</text>
  </g>

  <g aria-label="Вертикальный маршрут">
    <path d="M154 890V1286" stroke="url(#routeLine)" stroke-width="10" stroke-linecap="round"/>
    <g font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
      <circle cx="154" cy="902" r="30" fill="#2E7CF6"/>
      <text x="224" y="916" font-size="36" font-weight="760" fill="#F2F2F2">01 Ситуация</text>
      <text x="224" y="956" font-size="22" fill="#DDE3EA">что уже есть</text>

      <circle cx="154" cy="1034" r="30" fill="#245DA7"/>
      <text x="224" y="1048" font-size="36" font-weight="760" fill="#F2F2F2">02 Разбор</text>
      <text x="224" y="1088" font-size="22" fill="#DDE3EA">смотрим вводные</text>

      <circle cx="154" cy="1166" r="30" fill="#245DA7"/>
      <text x="224" y="1180" font-size="36" font-weight="760" fill="#F2F2F2">03 Документы</text>
      <text x="224" y="1220" font-size="22" fill="#DDE3EA">понимаем комплект</text>

      <circle cx="154" cy="1298" r="30" fill="#C6FF00"/>
      <text x="224" y="1312" font-size="36" font-weight="760" fill="#F2F2F2">04 Следующий шаг</text>
      <text x="224" y="1352" font-size="22" fill="#DDE3EA">фиксируем маршрут</text>
    </g>
  </g>

  <rect x="72" y="1458" width="502" height="96" rx="16" fill="#C6FF00"/>
  <text x="118" y="1518" font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="32" font-weight="820" fill="#111318">Разобрать ситуацию</text>

  <g font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
    <text x="72" y="1618" font-size="30" font-weight="760" fill="#F2F2F2">+7 (978) 998-72-22</text>
  </g>
</svg>
