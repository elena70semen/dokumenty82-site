<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Документы для бизнеса — universal graphic matrix board V0.1</title>
  <desc id="desc">Черновой бренд-борд универсальной графической матрицы: ядро, контур услуг, цвет, типографика, графический язык, сетка и применение.</desc>
  <metadata>status: REVIEW / DRAFT; uses brandTokens.expressivePalette; public use requires owner, design and rights approval. Not a logo, not a final brandbook, not a public advertisement.</metadata>
  <defs>
    <linearGradient id="deepBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.52" stop-color="#111318"/>
      <stop offset="1" stop-color="#2A2D34"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F2F2"/>
    </linearGradient>
    <linearGradient id="accentRoute" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7B61FF"/>
      <stop offset="0.52" stop-color="#C6FF00"/>
      <stop offset="1" stop-color="#F2F2F2"/>
    </linearGradient>
    <linearGradient id="businessDepth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111318"/>
      <stop offset="0.54" stop-color="#2A2D34"/>
      <stop offset="1" stop-color="#7B61FF"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F2F2F2" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <pattern id="paperGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#111318" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0B0F14" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-24%" y="-24%" width="148%" height="148%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .label { font-size: 16px; font-weight: 760; letter-spacing: 3px; text-transform: uppercase; }
      .body { font-size: 18px; line-height: 1.5; }
      .small { font-size: 14px; }
      .panel-title { font-size: 22px; font-weight: 820; }
      .hero-title { font-size: 54px; font-weight: 860; letter-spacing: -1px; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#deepBg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <circle cx="1376" cy="142" r="260" fill="#7B61FF" opacity="0.18"/>
  <circle cx="240" cy="870" r="320" fill="#C6FF00" opacity="0.10"/>
  <path d="M-80 760C160 616 330 822 548 682S922 512 1166 664 1462 706 1690 478" fill="none" stroke="url(#accentRoute)" stroke-width="18" stroke-linecap="round" opacity="0.22"/>

  <g class="font">
    <g transform="translate(48 48)">
      <rect width="372" height="904" rx="34" fill="#111318" opacity="0.96" stroke="#F2F2F2" stroke-opacity="0.10"/>
      <text x="36" y="54" class="label" fill="#C6FF00">Universal matrix</text>
      <text x="36" y="138" class="hero-title" fill="#F2F2F2">GRAPHIC</text>
      <text x="36" y="204" class="hero-title" fill="#F2F2F2">MATRIX</text>
      <text x="36" y="268" font-size="25" font-weight="780" fill="#C6FF00">Документы для бизнеса</text>
      <text x="36" y="315" font-size="19" fill="#F2F2F2" opacity="0.82">Стильная деловая система:</text>
      <text x="36" y="345" font-size="19" fill="#F2F2F2" opacity="0.82">маршрут, документы, локальный офис.</text>

      <g transform="translate(36 418)">
        <rect width="300" height="88" rx="24" fill="#C6FF00"/>
        <text x="24" y="36" font-size="19" font-weight="800" fill="#111318">главный CTA</text>
        <text x="24" y="66" font-size="25" font-weight="860" fill="#111318">Разобрать ситуацию</text>
      </g>

      <g transform="translate(36 566)">
        <path d="M0 80C72 10 122 122 190 64S282 26 310 4" fill="none" stroke="url(#accentRoute)" stroke-width="9" stroke-linecap="round"/>
        <g fill="#111318" stroke="#C6FF00" stroke-width="4">
          <circle cx="0" cy="80" r="14"/>
          <circle cx="190" cy="64" r="14"/>
          <circle cx="310" cy="4" r="14"/>
        </g>
        <text x="0" y="132" font-size="17" font-weight="760" fill="#F2F2F2">ситуация -> разбор -> документы -> шаг</text>
      </g>

      <g transform="translate(36 772)">
        <text x="0" y="0" class="label" fill="#F2F2F2" opacity="0.72">visual promise</text>
        <text x="0" y="42" font-size="21" font-weight="820" fill="#F2F2F2">Заметно, но делово</text>
        <text x="0" y="74" font-size="17" fill="#F2F2F2" opacity="0.78">один смысл, один акцент, один маршрут</text>
      </g>
    </g>

    <g transform="translate(452 48)">
      <g filter="url(#shadow)">
        <rect width="514" height="214" rx="28" fill="#F2F2F2"/>
      </g>
      <rect width="514" height="214" rx="28" fill="url(#paperGrid)"/>
      <text x="28" y="44" class="label" fill="#7B61FF">1. Ядро</text>
      <text x="28" y="88" font-size="32" font-weight="850" fill="#111318">Документы</text>
      <text x="28" y="124" font-size="32" font-weight="850" fill="#111318">для бизнеса</text>
      <text x="28" y="160" font-size="20" font-weight="720" fill="#2A2D34">Центр подготовки документов</text>
      <text x="28" y="194" font-size="17" fill="#111318">Спокойный маршрут через документы</text>
      <rect x="366" y="34" width="112" height="112" rx="28" fill="#111318"/>
      <path d="M390 96C416 66 442 126 474 78" fill="none" stroke="url(#accentRoute)" stroke-width="9" stroke-linecap="round"/>
      <text x="374" y="174" font-size="13" font-weight="780" fill="#2A2D34">mark: HOLD</text>
    </g>

    <g transform="translate(998 48)">
      <rect width="554" height="214" rx="28" fill="#111318" stroke="#F2F2F2" stroke-opacity="0.10"/>
      <text x="28" y="44" class="label" fill="#C6FF00">2. Концепция</text>
      <text x="28" y="96" font-size="26" font-weight="820" fill="#F2F2F2">Ядро -> Контур -> Масштаб</text>
      <text x="28" y="134" font-size="18" fill="#F2F2F2" opacity="0.82">Деловая система с лаймовым сигналом</text>
      <text x="28" y="162" font-size="18" fill="#F2F2F2" opacity="0.82">и безопасной CTA-иерархией.</text>
      <g transform="translate(382 34)">
        <rect width="130" height="130" rx="26" fill="url(#businessDepth)"/>
        <path d="M16 98C44 38 74 118 114 28" fill="none" stroke="#C6FF00" stroke-width="7" stroke-linecap="round" opacity="0.92"/>
        <path d="M16 32H114M16 64H114M16 96H114" stroke="#F2F2F2" stroke-opacity="0.16"/>
        <path d="M32 16V114M64 16V114M96 16V114" stroke="#F2F2F2" stroke-opacity="0.12"/>
      </g>
    </g>

    <g transform="translate(452 294)">
      <rect width="514" height="224" rx="28" fill="#111318" stroke="#F2F2F2" stroke-opacity="0.10"/>
      <text x="28" y="44" class="label" fill="#C6FF00">3. Палитра</text>
      <g transform="translate(28 78)">
        <rect width="62" height="62" rx="16" fill="#C6FF00"/>
        <rect x="82" width="62" height="62" rx="16" fill="#7B61FF"/>
        <rect x="164" width="62" height="62" rx="16" fill="#0B0F14" stroke="#F2F2F2" stroke-opacity="0.16"/>
        <rect x="246" width="62" height="62" rx="16" fill="#111318" stroke="#F2F2F2" stroke-opacity="0.16"/>
        <rect x="328" width="62" height="62" rx="16" fill="#2A2D34"/>
        <rect x="410" width="62" height="62" rx="16" fill="#F2F2F2"/>
      </g>
      <text x="28" y="174" font-size="20" font-weight="820" fill="#F2F2F2">графит + лайм + фиолетовая глубина</text>
      <text x="28" y="204" font-size="16" fill="#F2F2F2" opacity="0.78">Яркость работает как навигация, а не как шум.</text>
    </g>

    <g transform="translate(998 294)">
      <rect width="260" height="224" rx="28" fill="url(#paper)"/>
      <text x="24" y="44" class="label" fill="#7B61FF">4. Типографика</text>
      <text x="24" y="130" font-size="88" font-weight="360" fill="#111318">Aa</text>
      <text x="134" y="104" font-size="20" font-weight="840" fill="#111318">Inter</text>
      <text x="134" y="134" font-size="18" fill="#2A2D34">рабочий текст</text>
      <text x="24" y="186" font-size="19" font-weight="820" fill="#111318">Коротко. Крупно. Чётко.</text>
    </g>

    <g transform="translate(1292 294)">
      <rect width="260" height="224" rx="28" fill="#F2F2F2"/>
      <text x="24" y="44" class="label" fill="#7B61FF">5. Акцент</text>
      <rect x="24" y="80" width="212" height="74" rx="22" fill="#C6FF00"/>
      <text x="48" y="127" font-size="26" font-weight="860" fill="#111318">Показать</text>
      <path d="M38 184H220" stroke="#C6FF00" stroke-width="9" stroke-linecap="round"/>
      <circle cx="38" cy="184" r="13" fill="#111318" stroke="#C6FF00" stroke-width="5"/>
      <circle cx="220" cy="184" r="13" fill="#111318" stroke="#C6FF00" stroke-width="5"/>
    </g>

    <g transform="translate(452 550)">
      <rect width="356" height="256" rx="28" fill="#F2F2F2"/>
      <rect width="356" height="256" rx="28" fill="url(#paperGrid)"/>
      <text x="28" y="44" class="label" fill="#7B61FF">6. Графика</text>
      <rect x="42" y="84" width="130" height="146" rx="20" fill="#FFFFFF" stroke="#111318" stroke-opacity="0.16"/>
      <path d="M70 122H146M70 154H134M70 186H150" stroke="#111318" stroke-opacity="0.36" stroke-width="6" stroke-linecap="round"/>
      <path d="M198 196C236 124 266 222 314 86" fill="none" stroke="url(#accentRoute)" stroke-width="10" stroke-linecap="round"/>
      <circle cx="198" cy="196" r="14" fill="#111318" stroke="#7B61FF" stroke-width="5"/>
      <circle cx="314" cy="86" r="14" fill="#111318" stroke="#C6FF00" stroke-width="5"/>
    </g>

    <g transform="translate(840 550)">
      <rect width="356" height="256" rx="28" fill="#111318" stroke="#F2F2F2" stroke-opacity="0.10"/>
      <text x="28" y="44" class="label" fill="#C6FF00">7. Сетка</text>
      <g transform="translate(30 78)" stroke="#F2F2F2" stroke-opacity="0.17" fill="none">
        <rect width="296" height="134" rx="12"/>
        <path d="M24 0V134M48 0V134M72 0V134M96 0V134M120 0V134M144 0V134M168 0V134M192 0V134M216 0V134M240 0V134M264 0V134"/>
        <path d="M0 34H296M0 68H296M0 102H296"/>
      </g>
      <rect x="54" y="102" width="120" height="56" rx="12" fill="#C6FF00"/>
      <rect x="190" y="102" width="112" height="92" rx="12" fill="#7B61FF"/>
      <text x="30" y="232" font-size="16" fill="#F2F2F2" opacity="0.76">12 колонок + bento-модули + safe zones</text>
    </g>

    <g transform="translate(1228 550)">
      <rect width="324" height="256" rx="28" fill="#F2F2F2"/>
      <text x="28" y="44" class="label" fill="#7B61FF">8. Применение</text>
      <g transform="translate(28 78)">
        <rect width="78" height="78" rx="16" fill="#111318"/>
        <text x="14" y="36" font-size="14" font-weight="820" fill="#F2F2F2">AD</text>
        <path d="M14 58C30 36 48 68 64 26" fill="none" stroke="#C6FF00" stroke-width="4" stroke-linecap="round"/>
        <rect x="104" width="54" height="112" rx="18" fill="#0B0F14"/>
        <path d="M116 82C130 46 142 94 148 30" fill="none" stroke="#7B61FF" stroke-width="4" stroke-linecap="round"/>
        <rect x="184" y="16" width="104" height="56" rx="14" fill="#C6FF00"/>
        <text x="204" y="51" font-size="16" font-weight="840" fill="#111318">CTA</text>
      </g>
      <text x="28" y="214" font-size="15" fill="#2A2D34">smm / сайт / презентация</text>
      <text x="28" y="236" font-size="15" fill="#2A2D34">печать / наружка / локальный профиль</text>
    </g>

    <g transform="translate(452 842)">
      <rect width="1100" height="110" rx="28" fill="#111318" opacity="0.90" stroke="#F2F2F2" stroke-opacity="0.10"/>
      <text x="28" y="44" class="label" fill="#C6FF00">Правило выразительности</text>
      <text x="28" y="76" font-size="21" font-weight="840" fill="#F2F2F2">Один материал = один смысл + один CTA</text>
      <text x="28" y="102" font-size="21" font-weight="840" fill="#F2F2F2">один сервисный контур + один запоминающийся акцент</text>
      <text x="880" y="44" class="label" fill="#F2F2F2" opacity="0.72">status</text>
      <text x="880" y="78" font-size="20" font-weight="820" fill="#F2F2F2">REVIEW / DRAFT</text>
    </g>
  </g>
</svg>
