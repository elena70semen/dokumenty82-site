<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" role="img" aria-labelledby="title desc">
  <title id="title">Документы для бизнеса — local compact advertising pilot template</title>
  <desc id="desc">Компактный локальный шаблон 1200x628 для внутреннего рекламного пилота: бренд, категория, локальный маркер, телефон и CTA.</desc>
  <metadata>status: Stage 04 REVIEW / internal draft; public use requires owner, design and rights approval.</metadata>
  <defs>
    <linearGradient id="localSurface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#FBFAF6"/>
      <stop offset="1" stop-color="#F7F3EA"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C69A47"/>
      <stop offset="0.72" stop-color="#245DA7"/>
      <stop offset="1" stop-color="#C6FF00"/>
    </linearGradient>
    <pattern id="paperGrid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#162844" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="628" rx="28" fill="url(#localSurface)"/>
  <rect width="1200" height="628" rx="28" fill="url(#paperGrid)"/>
  <path d="M812 0H1200V628H770C828 474 850 280 812 0Z" fill="#162844"/>
  <path d="M990 54V574" stroke="#C69A47" stroke-opacity="0.28" stroke-width="20"/>
  <path d="M1036 54V574" stroke="#C6FF00" stroke-opacity="0.22" stroke-width="12"/>

  <g font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
    <text x="64" y="96" font-size="32" font-weight="840" fill="#111821">Документы для бизнеса</text>
    <text x="64" y="140" font-size="22" font-weight="650" fill="#667184">Центр подготовки документов</text>

    <text x="64" y="250" font-size="58" font-weight="780" fill="#111821">Симферополь</text>
    <text x="64" y="314" font-size="34" font-weight="720" fill="#162844">офис рядом с налоговой</text>
    <text x="64" y="376" font-size="28" font-weight="500" fill="#2A2D34">Разберём ситуацию и подготовим документы.</text>

    <rect x="64" y="444" width="328" height="72" rx="14" fill="#245DA7"/>
    <text x="106" y="490" font-size="24" font-weight="820" fill="#FFFFFF">Разобрать ситуацию</text>
    <text x="440" y="490" font-size="30" font-weight="840" fill="#162844">+7 (978) 998-72-22</text>
  </g>

  <g aria-label="Мини-маршрут офис и контакты">
    <rect x="848" y="166" width="264" height="292" rx="18" fill="#F2F2F2" fill-opacity="0.08" stroke="#F2F2F2" stroke-opacity="0.16"/>
    <path d="M892 330H1068" stroke="url(#route)" stroke-width="9" stroke-linecap="round"/>
    <circle cx="892" cy="330" r="17" fill="#C69A47"/>
    <circle cx="980" cy="330" r="17" fill="#245DA7"/>
    <circle cx="1068" cy="330" r="18" fill="#C6FF00" stroke="#111318" stroke-width="4"/>
    <text x="890" y="250" font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" font-weight="760" fill="#F2F2F2">Офис и контакты</text>
    <text x="890" y="410" font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="20" fill="#DDE3EA">звонок · маршрут · офис</text>
  </g>
</svg>
