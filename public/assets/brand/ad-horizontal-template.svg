<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-labelledby="title desc">
  <title id="title">Документы для бизнеса — horizontal advertising pilot template</title>
  <desc id="desc">Горизонтальный шаблон 1600x600 для внутреннего рекламного пилота: короткий заголовок слева, CTA и маршрутная графика справа.</desc>
  <metadata>status: Stage 04 REVIEW / internal draft; public use requires owner, design and rights approval.</metadata>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.68" stop-color="#F2F2F2"/>
      <stop offset="1" stop-color="#DDE3EA"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111318"/>
      <stop offset="1" stop-color="#162844"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#245DA7"/>
      <stop offset="0.72" stop-color="#2E7CF6"/>
      <stop offset="1" stop-color="#C6FF00"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#162844" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="600" rx="28" fill="url(#paper)"/>
  <rect width="1600" height="600" rx="28" fill="url(#grid)"/>
  <path d="M968 0H1600V600H894C950 468 974 274 968 0Z" fill="url(#panel)"/>
  <path d="M1160 52V548" stroke="#7B61FF" stroke-opacity="0.20" stroke-width="36"/>
  <path d="M1224 52V548" stroke="#C6FF00" stroke-opacity="0.18" stroke-width="14"/>

  <g font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
    <text x="104" y="100" font-size="24" font-weight="800" fill="#245DA7">Документы для бизнеса</text>
    <text x="104" y="140" font-size="21" font-weight="650" fill="#667184">Центр подготовки документов</text>
    <text x="104" y="254" font-size="68" font-weight="760" fill="#111821">Сначала</text>
    <text x="104" y="330" font-size="68" font-weight="760" fill="#111821">разберём ситуацию</text>
    <text x="104" y="394" font-size="29" fill="#2A2D34">Потом подготовим документы и следующий шаг.</text>
  </g>

  <rect x="104" y="462" width="378" height="76" rx="14" fill="#245DA7"/>
  <text x="148" y="510" font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="25" font-weight="820" fill="#FFFFFF">Разобрать ситуацию</text>

  <g aria-label="Контур разбор ситуации">
    <rect x="1038" y="152" width="406" height="246" rx="20" fill="#F2F2F2" fill-opacity="0.08" stroke="#F2F2F2" stroke-opacity="0.16"/>
    <path d="M1086 290H1398" stroke="url(#route)" stroke-width="10" stroke-linecap="round"/>
    <g fill="#111318" stroke="#F2F2F2" stroke-width="4">
      <circle cx="1086" cy="290" r="18"/>
      <circle cx="1242" cy="290" r="18"/>
    </g>
    <circle cx="1398" cy="290" r="19" fill="#C6FF00" stroke="#111318" stroke-width="4"/>
    <g font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="20" font-weight="720" fill="#DDE3EA">
      <text x="1064" y="242">01</text>
      <text x="1220" y="242">02</text>
      <text x="1368" y="242" fill="#F2F2F2">03</text>
      <text x="1084" y="350">разбор ситуации</text>
    </g>
  </g>

  <text x="1040" y="504" font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="29" font-weight="800" fill="#F2F2F2">+7 (978) 998-72-22</text>
</svg>
