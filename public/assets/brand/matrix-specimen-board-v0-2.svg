    <rect y="28" width="520" height="238" rx="16" fill="#FBFAF6" filter="url(#softShadow)"/>
    <text x="28" y="86" class="sans title" fill="#111821">Display / headline</text>
    <text x="28" y="132" class="sans headline" fill="#111821">Сначала разбираем ситуацию</text>
    <text x="28" y="178" class="sans body" fill="#111821">Body text stays calm, readable and rational.</text>
    <rect x="28" y="202" width="216" height="44" rx="8" fill="#245DA7"/>
    <text x="48" y="230" class="sans caption" fill="#FFFFFF">Разобрать ситуацию</text>
    <text x="268" y="229" class="sans small" fill="#667184">Caption: restricted size/color</text>
  </g>

  <g transform="translate(648 430)">
