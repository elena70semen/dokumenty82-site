<svg width="1800" height="1400" viewBox="0 0 1800 1400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Matrix specimen board V0.2</title>
  <desc id="desc">Internal review board for Документы для бизнеса visual matrix: palette, typography, backgrounds, UI fragments and format skeletons.</desc>
  <defs>
    <linearGradient id="depth" x1="84" y1="80" x2="1716" y2="1320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F14"/>
      <stop offset="0.58" stop-color="#111318"/>
      <stop offset="1" stop-color="#33215F"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FBFAF6"/>
      <stop offset="1" stop-color="#F7F3EA"/>
    </linearGradient>
    <linearGradient id="routeAccent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#245DA7"/>
      <stop offset="1" stop-color="#C6FF00"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#DDE3EA" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111318" flood-opacity="0.16"/>
    </filter>
    <style>
      .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .label { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
      .caption { font-size: 15px; font-weight: 500; }
      .small { font-size: 13px; font-weight: 500; }
      .title { font-size: 42px; font-weight: 760; letter-spacing: 0; }
      .headline { font-size: 30px; font-weight: 720; letter-spacing: 0; }
      .body { font-size: 18px; font-weight: 500; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1800" height="1400" fill="url(#depth)"/>
  <rect x="0" y="0" width="1800" height="1400" fill="url(#grid)" opacity="0.12"/>
  <path d="M-80 960C210 800 320 1040 590 860C855 684 1000 706 1250 560C1460 438 1600 360 1880 410" stroke="#7B61FF" stroke-width="34" stroke-linecap="round" opacity="0.18"/>
  <path d="M-60 982C240 820 330 1060 608 884C870 718 1014 728 1262 590C1480 468 1608 392 1870 436" stroke="#C6FF00" stroke-width="8" stroke-linecap="round" opacity="0.82"/>

  <rect x="44" y="44" width="1712" height="1312" rx="28" fill="#0B0F14" fill-opacity="0.72" stroke="#3A3F48"/>

  <text x="84" y="106" class="sans label" fill="#C6FF00">REVIEW SPECIMEN BOARD · NOT APPROVED FOR PUBLIC USE</text>
  <text x="84" y="162" class="sans title" fill="#F2F2F2">Деловая ясность с управляемым световым акцентом</text>
  <text x="84" y="200" class="sans body" fill="#DDE3EA">Спокойный маршрут через документы: ситуация → разбор → комплект → следующий шаг</text>

  <g transform="translate(84 250)">
    <text class="sans label" fill="#DDE3EA">01 Palette roles</text>
    <g transform="translate(0 28)">
      <rect width="116" height="92" rx="12" fill="#0B0F14" stroke="#3A3F48"/>
      <rect x="132" width="116" height="92" rx="12" fill="#111318" stroke="#3A3F48"/>
      <rect x="264" width="116" height="92" rx="12" fill="#2A2D34"/>
      <rect x="396" width="116" height="92" rx="12" fill="#F7F3EA"/>
      <rect x="528" width="116" height="92" rx="12" fill="#FBFAF6"/>
      <rect x="660" width="116" height="92" rx="12" fill="#C6FF00"/>
      <rect x="792" width="116" height="92" rx="12" fill="#33215F"/>
      <rect x="924" width="116" height="92" rx="12" fill="#245DA7"/>
      <rect x="1056" width="116" height="92" rx="12" fill="#C69A47"/>
      <rect x="1188" width="116" height="92" rx="12" fill="#6C2537"/>
      <text x="0" y="122" class="sans small" fill="#DDE3EA">dark base</text>
      <text x="660" y="122" class="sans small" fill="#C6FF00">signal</text>
      <text x="792" y="122" class="sans small" fill="#DDE3EA">depth</text>
      <text x="1056" y="122" class="sans small" fill="#DDE3EA">local/trust</text>
    </g>
  </g>

  <g transform="translate(84 430)">
