    <rect x="354" y="64" width="128" height="18" rx="9" fill="#111821"/>
    <rect x="354" y="98" width="82" height="22" rx="6" fill="#245DA7"/>
    <circle cx="562" cy="84" r="18" fill="#C6FF00"/>
