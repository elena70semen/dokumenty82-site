    <circle cx="315" cy="178" r="12" fill="#C6FF00"/>
    <circle cx="485" cy="142" r="12" fill="#C6FF00"/>

    <rect x="570" y="30" width="300" height="250" rx="18" fill="#FBFAF6" stroke="#DDE3EA"/>
    <rect x="594" y="58" width="138" height="28" rx="8" fill="#DDE3EA"/>
    <rect x="594" y="108" width="226" height="16" rx="8" fill="#111821"/>
    <rect x="594" y="138" width="210" height="10" rx="5" fill="#667184"/>
    <rect x="594" y="166" width="130" height="38" rx="8" fill="#245DA7"/>
    <text x="594" y="236" class="sans small" fill="#667184">service card skeleton</text>

    <rect x="910" y="30" width="394" height="250" rx="18" fill="#111318" stroke="#3A3F48"/>
    <text x="940" y="84" class="sans headline" fill="#F2F2F2">CTA block</text>
    <text x="940" y="124" class="sans body" fill="#DDE3EA">No pressure. Safe first step.</text>
    <rect x="940" y="160" width="210" height="52" rx="8" fill="#C6FF00"/>
    <text x="968" y="193" class="sans caption" fill="#111318">Понять следующий шаг</text>
    <rect x="1164" y="160" width="96" height="52" rx="8" fill="#2A2D34" stroke="#3A3F48"/>
  </g>

  <g transform="translate(84 1110)">
