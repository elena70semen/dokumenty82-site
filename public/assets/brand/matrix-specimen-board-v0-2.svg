    <rect x="650" y="30" width="320" height="150" rx="16" fill="#0B0F14" stroke="#3A3F48"/>
    <rect x="684" y="72" width="170" height="22" rx="11" fill="#F2F2F2"/>
    <rect x="684" y="112" width="120" height="30" rx="8" fill="#C6FF00"/>
    <text x="650" y="206" class="sans small" fill="#DDE3EA">outdoor</text>

    <rect x="1010" y="30" width="230" height="130" rx="16" fill="#33215F" stroke="#3A3F48"/>
    <rect x="1036" y="70" width="132" height="18" rx="9" fill="#F2F2F2"/>
    <rect x="1036" y="104" width="88" height="10" rx="5" fill="#DDE3EA"/>
    <text x="1010" y="186" class="sans small" fill="#DDE3EA">slide cover</text>

    <rect x="1280" y="30" width="150" height="200" rx="10" fill="#FBFAF6" stroke="#DDE3EA"/>
    <rect x="1300" y="58" width="92" height="12" rx="6" fill="#111821"/>
    <rect x="1300" y="90" width="108" height="8" rx="4" fill="#667184"/>
    <rect x="1300" y="112" width="96" height="8" rx="4" fill="#667184"/>
    <rect x="1300" y="154" width="58" height="18" rx="6" fill="#245DA7"/>
    <text x="1280" y="256" class="sans small" fill="#DDE3EA">A4</text>
  </g>

  <g transform="translate(1240 250)">
    <rect width="390" height="142" rx="16" fill="#111318" stroke="#3A3F48"/>
    <text x="24" y="48" class="sans label" fill="#C6FF00">Rules</text>
    <text x="24" y="82" class="sans caption" fill="#F2F2F2">1 meaning · 1 CTA · 1 contour</text>
    <text x="24" y="112" class="sans small" fill="#DDE3EA">Lime is signal. Violet is depth. Gold is not authority.</text>
  </g>

  <g transform="translate(1240 430)">
    <rect width="390" height="238" rx="16" fill="#FBFAF6" stroke="#DDE3EA"/>
    <text x="24" y="46" class="sans label" fill="#245DA7">Forbidden pair examples</text>
    <rect x="24" y="72" width="146" height="52" rx="10" fill="#C6FF00"/>
    <text x="44" y="105" class="sans caption" fill="#FFFFFF">white on lime</text>
    <text x="184" y="104" class="sans small" fill="#111821">FAIL for text</text>
    <rect x="24" y="148" width="146" height="52" rx="10" fill="#7B61FF"/>
    <text x="44" y="181" class="sans caption" fill="#FFFFFF">small body</text>
    <text x="184" y="180" class="sans small" fill="#111821">large only</text>
