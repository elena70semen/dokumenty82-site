    <rect y="30" width="530" height="250" rx="18" fill="#F7F3EA" stroke="#DDE3EA"/>
    <text x="28" y="84" class="sans headline" fill="#111821">Hero skeleton</text>
    <text x="28" y="122" class="sans body" fill="#667184">One route cue, one CTA, one contour.</text>
    <rect x="28" y="158" width="210" height="50" rx="8" fill="#162844"/>
    <text x="52" y="190" class="sans caption" fill="#FFFFFF">Разобрать ситуацию</text>
