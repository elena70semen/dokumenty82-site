    <g transform="translate(0 28)">
      <rect width="240" height="120" rx="16" fill="url(#paper)" stroke="#DDE3EA"/>
      <rect x="18" y="18" width="204" height="84" rx="10" fill="url(#grid)" opacity="0.42"/>
      <text x="20" y="148" class="sans small" fill="#DDE3EA">light matrix paper</text>

      <rect x="280" width="240" height="120" rx="16" fill="#111318" stroke="#3A3F48"/>
      <path d="M306 84C354 30 408 98 456 46C482 18 498 20 508 16" stroke="#7B61FF" stroke-width="11" stroke-linecap="round" opacity="0.38"/>
      <path d="M306 84C354 30 408 98 456 46C482 18 498 20 508 16" stroke="#C6FF00" stroke-width="3" stroke-linecap="round"/>
      <text x="300" y="148" class="sans small" fill="#DDE3EA">route ribbon</text>

      <rect x="560" width="240" height="120" rx="16" fill="#2A2D34"/>
      <rect x="590" y="24" width="88" height="72" rx="10" fill="#F2F2F2" opacity="0.86"/>
      <rect x="704" y="24" width="70" height="72" rx="10" fill="#DDE3EA" opacity="0.64"/>
      <text x="580" y="148" class="sans small" fill="#DDE3EA">document geometry</text>

      <rect x="840" width="240" height="120" rx="16" fill="#0B0F14"/>
      <rect x="870" y="30" width="180" height="54" rx="10" fill="#C6FF00"/>
      <text x="900" y="64" class="sans caption" fill="#111318">signal CTA</text>
      <text x="860" y="148" class="sans small" fill="#DDE3EA">dark business surface</text>
    </g>
  </g>

  <g transform="translate(84 760)">
