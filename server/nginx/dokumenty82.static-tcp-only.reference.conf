# Документы для бизнеса - static HTTPS/TCP reference config.
# Reference only. Not deployed. Review with owner/ops before any real use.
#
# Placeholders to replace during a separate hosting stage:
# - <STATIC_EXPORT_ROOT>: absolute path to the reviewed static export.
# - <OWNER_APPROVED_FULLCHAIN_PEM>: certificate file approved by ops.
# - <OWNER_APPROVED_PRIVKEY_PEM>: private key file approved by ops.
#
# Do not commit real certificate files, private key files, tokens or access data.
# HTTP/3, QUIC, UDP/443 and h3 Alt-Svc are intentionally not enabled here.

server {
  listen 80;
  server_name dokumenty82.ru www.dokumenty82.ru;

  return 301 https://dokumenty82.ru$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name dokumenty82.ru;

  # Reference placeholders only. Replace outside git during real hosting setup.
  # ssl_certificate <OWNER_APPROVED_FULLCHAIN_PEM>;
  # ssl_certificate_key <OWNER_APPROVED_PRIVKEY_PEM>;

  root <STATIC_EXPORT_ROOT>;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /robots.txt {
    try_files /robots.txt =404;
    add_header Cache-Control "public, max-age=300" always;
  }

  location = /sitemap.xml {
    try_files /sitemap.xml =404;
    add_header Cache-Control "public, max-age=300" always;
  }

  location /_next/static/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=604800" always;
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
    add_header Cache-Control "public, max-age=300" always;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name www.dokumenty82.ru;

  # Reference placeholders only. Replace outside git during real hosting setup.
  # ssl_certificate <OWNER_APPROVED_FULLCHAIN_PEM>;
  # ssl_certificate_key <OWNER_APPROVED_PRIVKEY_PEM>;

  return 301 https://dokumenty82.ru$request_uri;
}
